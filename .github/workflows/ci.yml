name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Lint: clippy must pass with no warnings (RUSTFLAGS=-D warnings makes warnings fatal)
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run clippy (all targets)
        run: cargo clippy --all-targets

  # Format check: rustfmt must produce no diffs
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Tests: unit + integration (deepseek adapter uses wiremock mock server)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  # Build: confirm the CLI binary compiles in release mode
  build:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --workspace --release
