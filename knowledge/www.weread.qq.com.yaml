# WeRead (weread.qq.com) — Tencent's digital reading platform
#
# Key patterns discovered during exploration (2026-05-17):
#
# 1. Homepage (https://weread.qq.com/)
#    - Search box: input at top, navigates to search results
#    - Book sections: 最近热搜, 继续阅读, 猜你喜欢, 榜单 (rising/newbook/all)
#    - Book links: a[href*="/web/reader/"] with text containing title + author
#    - Each book has recommendation score (推荐值 XX.X%)
#
# 2. Reader page (https://weread.qq.com/web/reader/<book_id>)
#    - Top bar: book title + chapter title, add to shelf button
#    - Content: RENDERED ON CANVAS (anti-copying). Text NOT in visible DOM.
#    - Available text sources (all hidden with display:none):
#      a) .readerNotePanel — popular highlights/annotations (richest source, ~17K chars)
#      b) .readerCatalog — table of contents with chapter titles
#      c) .wr_ai_outline_book_detail_wrapper — AI-generated book outline (~39K chars)
#      d) meta[name="description"] — book summary (~400 chars)
#    - Navigation: button "上一章" (prev), button "下一章" (next)
#    - Bottom bar: 目录 (TOC), font settings, theme, etc.
#
# 3. APIs (no login required for public content)
#    - Book info: GET /web/book/readInfo?bookId=<long_id>
#    - Chapter list: POST /web/book/chapterInfos body: {"bookIds":["<long_id>"]}
#    - Chapter content: POST /web/book/chapter/e_<chapterUid> (returns encoded HTML)
#      Encoding: 32-hex-chars + "PPD9" + base64(HTML)
#      Decoder: window.__WRPA__.decode() (obfuscated state machine)
#    - Book ID mapping: short ID (638162) in URLs, long ID (3300200375) in APIs
#
# 4. Chapter structure (from chapterInfos API)
#    - chapterUid: API chapter ID (used for content fetch)
#    - chapterIdx: positional index (1-based)
#    - title: chapter title
#    - wordCount: word count
#    - price/paid: payment gate status
#    - level: nesting level (1=chapter, 2=section, 3=subsection)
#    - tar: optional tar URL for media content
#    - files: XHTML file paths within the epub
#
# 5. Pitfalls
#    - Canvas rendering means no DOM text extraction; use hidden panels or APIs
#    - Two book ID formats: URL uses short ID, APIs use long ID
#    - Chapter API returns encoded content (not plain text)
#    - __WRPA__.decode is heavily obfuscated (switch-case state machine)
#    - SPA navigation: clicking next/prev doesn't change URL
#    - Meta description is book-level summary, NOT per-chapter content
#    - User may not be logged in; public books still accessible
#
# 6. JS helpers
#    - Book ID from URL: window.__INITIAL_STATE__.reader.bookId  (short)
#    - Book info: window.__INITIAL_STATE__.reader.bookInfo
#    - Chapter title: document.querySelector('.readerTopBar_title_chapter').textContent
#    - Hidden note text: document.querySelector('.readerNoteList')?.innerText
#    - AI outline: document.querySelector('.wr_outline_book_detail_main')?.innerText
